services:
  - type: web
    name: bozkurt-ai-omega
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENABLE_LIVE_DATA
        value: "true"
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: FOOTBALL_DATA_KEY
        sync: false